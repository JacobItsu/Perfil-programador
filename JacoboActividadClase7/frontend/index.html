<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        #app {
            max-width: 420px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #2a75bb, 5px 5px 0 rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        header p {
            color: #a0aec0;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        .search-row input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-row input:focus {
            border-color: #ffcc00;
        }

        .search-row input::placeholder {
            color: #6b7280;
        }

        .search-row button {
            padding: 12px 24px;
            background: #ffcc00;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .search-row button:hover {
            background: #e6b800;
        }

        .search-row button:active {
            transform: scale(0.96);
        }

        .hidden {
            display: none !important;
        }

        #errorContainer {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
            color: #fca5a5;
        }

        #resultContainer {
            margin-top: 16px;
        }

        .pokemon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .pokemon-header h2 {
            font-size: 1.8rem;
            color: #ffffff;
        }

        .favorite-btn {
            background: none;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
        }

        .favorite-btn.active {
            border-color: #ffcc00;
            color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
        }

        .favorite-btn:hover {
            border-color: #ffcc00;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px 10px;
            text-align: center;
        }

        .info-item .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .info-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
        }

        .favorites-section h2 {
            font-size: 1.2rem;
            color: #d1d5db;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .favorites-section h2 span {
            font-size: 1rem;
        }

        #favoritesList {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 44px;
        }

        #favoritesList.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .fav-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 204, 0, 0.12);
            border: 1px solid rgba(255, 204, 0, 0.25);
            border-radius: 20px;
            padding: 6px 14px 6px 16px;
            font-size: 0.9rem;
            color: #ffcc00;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fav-chip:hover {
            background: rgba(255, 204, 0, 0.2);
        }

        .fav-chip .remove {
            font-size: 1.1rem;
            line-height: 1;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .fav-chip .remove:hover {
            opacity: 1;
        }

        #loadingIndicator {
            text-align: center;
            padding: 20px;
            color: #9ca3af;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #ffcc00;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 440px) {
            body { padding: 20px 12px; }
            header h1 { font-size: 2rem; }
            .info-grid { grid-template-columns: 1fr; }
            .search-row { flex-direction: column; }
            .search-row button { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>POKEDEX</h1>
            <p>Busca y guarda tus Pokemon favoritos</p>
        </header>

        <div class="card">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Ej: Pikachu, Charmander..." autofocus>
                <button id="searchBtn">Buscar</button>
            </div>
            <div id="loadingIndicator" class="hidden">
                <div class="spinner"></div>
            </div>
            <div id="resultContainer" class="hidden">
                <div class="pokemon-header">
                    <h2 id="pokemon-name"></h2>
                    <button id="favoriteToggle" class="favorite-btn" title="Marcar como favorito">&#9734;</button>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">Tipo</div>
                        <div class="value" id="pokemon-type">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Nivel</div>
                        <div class="value" id="pokemon-level">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">HP</div>
                        <div class="value" id="pokemon-hp">-</div>
                    </div>
                </div>
            </div>
            <div id="errorContainer" class="hidden"></div>
        </div>

        <div class="card favorites-section">
            <h2>&#9733; Favoritos <span id="favoritesCount"></span></h2>
            <div id="favoritesList" class="empty">Aun no tienes favoritos</div>
        </div>
    </div>

    <script>
        var CONFIG = {
            API_BASE_URL: 'http://127.0.0.1:5000'
        };

        var STORAGE_KEY = 'pokedex_favorites';

        var searchInput = document.getElementById('searchInput');
        var searchBtn = document.getElementById('searchBtn');
        var resultContainer = document.getElementById('resultContainer');
        var errorContainer = document.getElementById('errorContainer');
        var loadingIndicator = document.getElementById('loadingIndicator');
        var pokeNombre = document.getElementById('pokemon-name');
        var pokeTipo = document.getElementById('pokemon-type');
        var pokeNivel = document.getElementById('pokemon-level');
        var pokeHp = document.getElementById('pokemon-hp');
        var favoriteToggle = document.getElementById('favoriteToggle');
        var favoritesList = document.getElementById('favoritesList');
        var favoritesCount = document.getElementById('favoritesCount');

        var currentPokemon = null;

        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch (_a) {
                return [];
            }
        }

        function setFavorites(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function toggleFavorite(name) {
            var favs = getFavorites();
            var idx = favs.indexOf(name);
            if (idx === -1) {
                favs.push(name);
            } else {
                favs.splice(idx, 1);
            }
            setFavorites(favs);
            renderFavorites();
            updateFavoriteButton(name);
        }

        function isFavorite(name) {
            return getFavorites().indexOf(name) !== -1;
        }

        function updateFavoriteButton(name) {
            if (!name) {
                favoriteToggle.classList.remove('active');
                favoriteToggle.innerHTML = '&#9734;';
                return;
            }
            if (isFavorite(name)) {
                favoriteToggle.classList.add('active');
                favoriteToggle.innerHTML = '&#9733;';
            } else {
                favoriteToggle.classList.remove('active');
                favoriteToggle.innerHTML = '&#9734;';
            }
        }

        function renderFavorites() {
            var favs = getFavorites();
            favoritesCount.textContent = '(' + favs.length + ')';
            if (favs.length === 0) {
                favoritesList.className = 'empty';
                favoritesList.innerHTML = 'Aun no tienes favoritos';
                return;
            }
            favoritesList.className = '';
            favoritesList.innerHTML = favs.map(function (name) {
                return '<span class="fav-chip" data-name="' + name + '">' + name + ' <span class="remove" data-action="remove" data-name="' + name + '">&times;</span></span>';
            }).join('');
        }

        function showLoading(show) {
            loadingIndicator.classList.toggle('hidden', !show);
        }

        function mostrarError(message) {
            errorContainer.textContent = message;
            errorContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
        }

        function renderizarCard(pokemon) {
            currentPokemon = pokemon;
            errorContainer.classList.add('hidden');
            pokeNombre.textContent = pokemon.name;
            pokeTipo.textContent = `Tipo: ${pokemon.type}`;
            pokeNivel.textContent = `Nivel: ${pokemon.level}`;
            pokeHp.textContent = `HP: ${pokemon.hp}`;
            updateFavoriteButton(pokemon.name);
            resultContainer.classList.remove('hidden');
        }

        function hideResult() {
            resultContainer.classList.add('hidden');
            currentPokemon = null;
        }

        async function buscarPokemon(nombre) {
            var trimmed = nombre.trim();
            if (!trimmed) return;

            showLoading(true);
            hideResult();
            errorContainer.classList.add('hidden');

            try {
                var res = await fetch(CONFIG.API_BASE_URL + '/api/pokemon/' + trimmed.toLowerCase());
                if (res.status === 404) {
                    mostrarError('El Pokemon no pertenece a las primeras 3 generaciones.');
                    return;
                }
                if (!res.ok) {
                    mostrarError('Error al conectar con la API.');
                    return;
                }
                var pokemon = await res.json();
                renderizarCard(pokemon);
            } catch (_a) {
                mostrarError('La API esta caida.');
            } finally {
                showLoading(false);
            }
        }

        favoriteToggle.addEventListener('click', function () {
            if (currentPokemon) {
                toggleFavorite(currentPokemon.name);
            }
        });

        favoritesList.addEventListener('click', function (e) {
            var target = e.target;
            if (target.getAttribute('data-action') === 'remove') {
                var name = target.getAttribute('data-name');
                if (name) {
                    var favs = getFavorites();
                    var idx = favs.indexOf(name);
                    if (idx !== -1) favs.splice(idx, 1);
                    setFavorites(favs);
                    renderFavorites();
                    if (currentPokemon && currentPokemon.name === name) {
                        updateFavoriteButton(name);
                    }
                }
                return;
            }
            var chip = target.closest('.fav-chip');
            if (chip) {
                var name = chip.getAttribute('data-name');
                if (name) buscarPokemon(name);
            }
        });

        searchBtn.addEventListener('click', function () {
            buscarPokemon(searchInput.value);
        });

        searchInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') buscarPokemon(searchInput.value);
        });

        renderFavorites();
    </script>
</body>
</html>
